<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập | Shop Mã Xã Hội Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --accent: #6c63ff; --bg: #0d0f14; --card: #161a23; --border: #232736; }
  * { box-sizing: border-box; }
  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .bg-glow {
    position: absolute; width: 600px; height: 600px;
    border-radius: 50%; top: -200px; right: -200px;
    background: radial-gradient(circle, rgba(108,99,255,.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .bg-glow2 {
    position: absolute; width: 400px; height: 400px;
    border-radius: 50%; bottom: -150px; left: -100px;
    background: radial-gradient(circle, rgba(255,101,132,.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    width: 380px;
    position: relative; z-index: 1;
    box-shadow: 0 40px 80px rgba(0,0,0,.4);
  }
  .login-icon {
    width: 60px; height: 60px; border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 24px;
    box-shadow: 0 8px 20px rgba(108,99,255,.4);
  }
  h2 { color: #e8eaf0; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  p.sub { color: #7b8290; font-size: 13px; margin-bottom: 28px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #7b8290; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-wrap { position: relative; }
  .input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #7b8290; font-size: 16px; }
  input {
    width: 100%; background: #1a1f2e;
    border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 12px 11px 38px;
    color: #e8eaf0; font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.15); }
  .btn-login {
    width: 100%; background: var(--accent);
    border: none; border-radius: 10px;
    padding: 12px; color: white;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; margin-top: 8px;
    font-family: inherit;
  }
  .btn-login:hover { background: #5a52e0; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(108,99,255,.3); }
  .error-msg { background: rgba(220,53,69,.15); border: 1px solid rgba(220,53,69,.3); color: #ff8a8a; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div class="login-box">
  <div class="login-icon">🤖</div>
  <h2>Admin Panel</h2>
  <p class="sub">Shop Mã Xã Hội — Đăng nhập để tiếp tục</p>

  {% for cat, msgs in get_flashed_messages(with_categories=true) %}
    {% for msg in msgs %}
    <div class="error-msg">{{ msg }}</div>
    {% endfor %}
  {% endfor %}

  <form method="POST">
    <div class="form-group">
      <label>Tên đăng nhập</label>
      <div class="input-wrap">
        <i class="bi bi-person"></i>
        <input type="text" name="username" placeholder="Username" required>
      </div>
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <div class="input-wrap">
        <i class="bi bi-lock"></i>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
    </div>
    <button type="submit" class="btn-login">Đăng nhập →</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
